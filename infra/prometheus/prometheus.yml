global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ticketing-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ticketing-service:8081']

  - job_name: 'validation-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['validation-service:8083']

  - job_name: 'wallet-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['wallet-service:8082']

  - job_name: 'pricing-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['pricing-service:8084']

  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:8085']

  - job_name: 'customer-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['customer-service:8086']

  - job_name: 'audit-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['audit-service:8087']

  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

