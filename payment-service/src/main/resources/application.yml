server:
  port: 8085
spring:
  application:
    name: payment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketbus}
    username: ${DB_USER:ticketbus}
    password: ${DB_PASS:ticketbus}
  jpa:
    hibernate:
      ddl-auto: update
payment:
  gateway-url: ${PAYMENT_GATEWAY_URL:https://api.example-payment.com}
  api-key: ${PAYMENT_API_KEY:dev-key}
