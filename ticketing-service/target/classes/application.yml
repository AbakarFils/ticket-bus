server:
  port: 8081
spring:
  application:
    name: ticketing-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketbus}
    username: ${DB_USER:ticketbus}
    password: ${DB_PASS:ticketbus}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
ticketing:
  rsa:
    private-key: ${RSA_PRIVATE_KEY:}
    public-key: ${RSA_PUBLIC_KEY:}
  ticket:
    validity-minutes: 60
services:
  wallet-url: ${WALLET_URL:http://localhost:8082}
