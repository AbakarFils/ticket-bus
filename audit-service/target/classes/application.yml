server:
  port: 8087
spring:
  application:
    name: audit-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketbus}
    username: ${DB_USER:ticketbus}
    password: ${DB_PASS:ticketbus}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
audit:
  anomaly-detection:
    enabled: true
    interval-seconds: 300
    max-validations-per-hour: 10

