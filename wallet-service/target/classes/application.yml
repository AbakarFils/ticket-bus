server:
  port: 8082
spring:
  application:
    name: wallet-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketbus}
    username: ${DB_USER:ticketbus}
    password: ${DB_PASS:ticketbus}
  jpa:
    hibernate:
      ddl-auto: update
services:
  audit-url: ${AUDIT_URL:http://localhost:8087}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
