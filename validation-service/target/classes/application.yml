server:
  port: 8083
spring:
  application:
    name: validation-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketbus}
    username: ${DB_USER:ticketbus}
    password: ${DB_PASS:ticketbus}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
validation:
  collision-window-minutes: 5
  rsa:
    public-key: ${RSA_PUBLIC_KEY:}
services:
  audit-url: ${AUDIT_URL:http://localhost:8087}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
