server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/ticketbus}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/ticketbus}/protocol/openid-connect/certs

  cloud:
    gateway:
      routes:
        # Public endpoints (no auth required)
        - id: public-tickets
          uri: ${TICKETING_URL:http://localhost:8081}
          predicates:
            - Path=/api/tickets/public-key
          filters:
            - name: RemoveRequestHeader
              args:
                name: Authorization

        # Protected ticketing endpoints
        - id: ticketing-service
          uri: ${TICKETING_URL:http://localhost:8081}
          predicates:
            - Path=/api/tickets/**, /api/products/**
          filters:
            - TokenRelay

        - id: validation-service
          uri: ${VALIDATION_URL:http://localhost:8083}
          predicates:
            - Path=/api/validate/**
          filters:
            - TokenRelay

        - id: wallet-service
          uri: ${WALLET_URL:http://localhost:8082}
          predicates:
            - Path=/api/wallets/**
          filters:
            - TokenRelay

        - id: pricing-service
          uri: ${PRICING_URL:http://localhost:8084}
          predicates:
            - Path=/api/pricing/**
          filters:
            - TokenRelay

        - id: payment-service
          uri: ${PAYMENT_URL:http://localhost:8085}
          predicates:
            - Path=/api/payments/**
          filters:
            - TokenRelay

        - id: customer-service
          uri: ${CUSTOMER_URL:http://localhost:8086}
          predicates:
            - Path=/api/customers/**
          filters:
            - TokenRelay

        - id: audit-service
          uri: ${AUDIT_URL:http://localhost:8087}
          predicates:
            - Path=/api/audit/**
          filters:
            - TokenRelay
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "https://ticketbus.fr"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
