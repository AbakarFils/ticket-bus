server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ticketing-service
          uri: ${TICKETING_URL:http://localhost:8081}
          predicates:
            - Path=/api/tickets/**, /api/products/**
        - id: validation-service
          uri: ${VALIDATION_URL:http://localhost:8083}
          predicates:
            - Path=/api/validate/**
        - id: wallet-service
          uri: ${WALLET_URL:http://localhost:8082}
          predicates:
            - Path=/api/wallets/**
        - id: pricing-service
          uri: ${PRICING_URL:http://localhost:8084}
          predicates:
            - Path=/api/pricing/**
        - id: payment-service
          uri: ${PAYMENT_URL:http://localhost:8085}
          predicates:
            - Path=/api/payments/**
        - id: customer-service
          uri: ${CUSTOMER_URL:http://localhost:8086}
          predicates:
            - Path=/api/customers/**
        - id: audit-service
          uri: ${AUDIT_URL:http://localhost:8087}
          predicates:
            - Path=/api/audit/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
